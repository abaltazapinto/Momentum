<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta
            name="description"
            content="Momentum is a simple personal task manager."
        >
        <script>
            try {
                const savedTheme = localStorage.getItem("momentum-theme")

                if (savedTheme === "dark") {
                    document.documentElement.dataset.theme = "dark"
                }
            } catch (error) {
                // The light theme remains available when storage is blocked.
            }
        </script>
        <title>Momentum</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap" rel="stylesheet">
        <link rel="icon" type="image/svg+xml" href="/assets/momentum-logo-DaSPDisd.svg">
        <link rel="icon" href="/assets/favicon-DNGr-S59.ico" sizes="any">
        <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32-euDZch58.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16-RKmhXvh6.png">
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon-CS7a2kyM.png">
        <link rel="manifest" href="/assets/site-BNHCqK-M.webmanifest">
      <script type="module" crossorigin src="/assets/index-BNGmaGdp.js"></script>
      <link rel="stylesheet" crossorigin href="/assets/index-B14Jo3di.css">
    </head>
    <body>
        <main class="container">
            <header class="app-header">
                <h1>Momentum</h1>
                <p>Keep moving forward, one task at a time.</p>
                <button
                    type="button"
                    id="theme-toggle"
                    class="theme-toggle"
                    aria-label="Switch to dark mode"
                >
                    <svg class="lucide theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"></path>
                    </svg>
                    <svg class="lucide theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2"></path>
                        <path d="M12 20v2"></path>
                        <path d="m4.93 4.93 1.41 1.41"></path>
                        <path d="m17.66 17.66 1.41 1.41"></path>
                        <path d="M2 12h2"></path>
                        <path d="M20 12h2"></path>
                        <path d="m6.34 17.66-1.41 1.41"></path>
                        <path d="m19.07 4.93-1.41 1.41"></path>
                    </svg>
                </button>
            </header>

            <form id="task-form" class="task-form">
                <label for="task-input">Task</label>
                <input
                    type="text"
                    id="task-input"
                    name="task"
                    placeholder="What needs to be done?"
                    autocomplete="off"
                    required
                >
                <button type="submit" id="add-task-button">Add task</button>
            </form>

            <p id="task-status" class="task-status" role="status" aria-live="polite"></p>

            <ul id="task-list" aria-label="Tasks"></ul>
        </main>
    </body>
</html>
