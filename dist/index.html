<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta
            name="description"
            content="Momentum is a simple personal task manager."
        >
        <script>
            try {
                const savedTheme = localStorage.getItem("momentum-theme")

                if (savedTheme === "dark") {
                    document.documentElement.dataset.theme = "dark"
                }
            } catch (error) {
                // The light theme remains available when storage is blocked.
            }
        </script>
        <title>Momentum</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300&display=swap" rel="stylesheet">
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon-DsB8IshM.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32-QQ_M0oox.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16-BLL8XS6d.png">
        <link rel="manifest" href="/assets/site-DFIRuVrR.webmanifest">
      <script type="module" crossorigin src="/assets/index-lKJSRd3l.js"></script>
      <link rel="stylesheet" crossorigin href="/assets/index-BZdvtmPV.css">
    </head>
    <body>
        <main class="container">
            <header class="app-header">
                <h1>Momentum</h1>
                <p>Keep moving forward, one task at a time.</p>
                <button
                    type="button"
                    id="theme-toggle"
                    class="theme-toggle"
                    aria-label="Switch to dark mode"
                >
                    <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"></path>
                    </svg>
                    <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <circle cx="12" cy="12" r="4"></circle>
                        <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41"></path>
                    </svg>
                </button>
            </header>

            <form id="task-form" class="task-form">
                <label for="task-input">Task</label>
                <input
                    type="text"
                    id="task-input"
                    name="task"
                    placeholder="What needs to be done?"
                    autocomplete="off"
                    required
                >
                <button type="submit" id="add-task-button">Add task</button>
            </form>

            <p id="task-status" class="task-status" role="status" aria-live="polite"></p>

            <ul id="task-list" aria-label="Tasks"></ul>
        </main>
    </body>
</html>
